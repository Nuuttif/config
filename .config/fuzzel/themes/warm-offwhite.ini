[colors]
; Warm off-white with pink tint
background=f8edebff

; Dark text for contrast on pastel background
text=2d2d2dff

; Match highlight (rose pine love/pink)
match=eb6f92ff

; Selection - slightly deeper warm tone
selection=f0e4e2ff

; Selection text - dark for readability
selection-text=2d2d2dff

; Iris (purple) border for visibility against pink wallpaper
border=c4a7e7ff

[main]
; Font configuration
font=JetBrainsMono Nerd Font:size=12

; Prompt color - iris to match border
prompt-color=c4a7e7ff

; Placeholder text styling - muted color
placeholder-color=6e6a86ff

; Input text color - dark for contrast
input-color=2d2d2dff

[border]
; Border width
width=2

; Corner radius (can be overridden by niri)
radius=8
