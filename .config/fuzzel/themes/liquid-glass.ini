[colors]
; Liquid glass - dark tint with transparency
background=191724cc

; Bright white text for maximum pop against dark bg
text=ffffffff

; Match highlight (rose pine love/pink)
match=eb6f92ff

; Selection with transparency
selection=26233acc

; Selection text - bright white
selection-text=ffffffff

; Iris (purple) border
border=c4a7e7ff

[main]
; Font configuration
font=JetBrainsMono Nerd Font:size=12

; Prompt color - iris to match border
prompt-color=c4a7e7ff

; Placeholder text styling
placeholder-color=6e6a86ff

; Input text color - bright white
input-color=ffffffff

[border]
; Border width
width=2

; Corner radius (can be overridden by niri)
radius=8
