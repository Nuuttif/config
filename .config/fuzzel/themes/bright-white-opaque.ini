[colors]
; Bright white opaque liquid glass
background=f0f0f0ff

; Bright white text with slight shadow effect via contrast
; Actually using very dark text for contrast on white
text=1a1a1aff

; Match highlight (rose pine love/pink)
match=eb6f92ff

; Selection - soft gray
selection=e8e8e8ff

; Selection text - dark
selection-text=1a1a1aff

; Iris (purple) border for visibility
border=c4a7e7ff

[main]
; Font configuration
font=JetBrainsMono Nerd Font:size=12

; Prompt color - iris to match border
prompt-color=c4a7e7ff

; Placeholder text styling - muted gray
placeholder-color=8a8a8aff

; Input text color - dark
input-color=1a1a1aff

[border]
; Border width
width=2

; Corner radius (can be overridden by niri)
radius=8
