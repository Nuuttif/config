# --- Mod key ---
general=main_mod,Super

# --- Screen / VSync ---
general=vsync,true
general=gaps_in,10
general=gaps_out,10
general=border_size,2

# --- Launch essential apps ---
exec-once=wezterm              # terminal
exec-once=waybar               # status bar
exec-once=mako                 # notifications
exec-once=hyprpaper --wallpaper "/home/nuutti/config/azskalt-little-numbat-boy.jpeg"

# --- Workspaces ---
workspace=1
workspace=2
workspace=3
workspace=4

# --- Keybindings ---
bind=SUPER+Return,exec,wezterm
bind=SUPER+d,exec,wofi --show drun

# --- Floating windows ---
float=title:"[W]"
